font=SauceCodePro Nerd Font:size=12:antialias=true

initial-window-size-chars=110x30
pad=10x10

notify=notify-send -a ${app-id} -i ${app-id} ${title} ${body}
workers=16

[scrollback]
multiplier=1.0
# indicator-position=relative
# indicator-format=""

[url]
launch=xdg-open ${url}
# label-letters=sadfjklewcmpgh
osc8-underline=url-mode
protocols=http, https, ftp, ftps, file, gemini, gopher
# uri-characters=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.,~:;/?#@!$&%*+="'()[]

[cursor]
style=underline
blink=yes
underline-thickness=2

[mouse]
hide-when-typing=true

[colors]
alpha=1
background=1a1b26
foreground=c0caf5
regular0=15161e
regular1=f7768e
regular2=9ece6a
regular3=e0af68
regular4=7aa2f7
regular5=bb9af7
regular6=7dcfff
regular7=a9b1d6
bright0=414868
bright1=f7768e
bright2=9ece6a
bright3=e0af68
bright4=7aa2f7
bright5=bb9af7
bright6=7dcfff
bright7=c0caf5
