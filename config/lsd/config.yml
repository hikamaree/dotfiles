classic: false
blocks:
  - permission
  - user
  - size
  - date
  - name

color:
  when: auto
  theme: default

date: '+%d.%m.%Y %H:%M'
dereference: false
display: almost-all

icons:
  when: never
  theme: fancy
  separator: " "

indicators: false
layout: grid

recursion:
  enabled: false

size: default

sorting:
  column: name
  reverse: false
  dir-grouping: none

no-symlink: false
total-size: false
hyperlink: never
symlink-arrow: ⇒
header: false
literal: false
truncate-owner:
  after:
  marker: ""
