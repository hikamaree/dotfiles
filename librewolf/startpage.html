<!doctype html>
<meta charset="utf-8" />
<meta name="colorscheme" content="dark" />
<meta name="robots" content="noindex" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>~</title>

<style>
    :root{
        --background: #1a1b26;
        --selected: #16161e;
        --text: #80c0d0;
	--font: 'Exo 2';
	--nerd: 'SauceCodePro Nerd Font';
        --font-size: clamp(1rem, 1.2vw, 2rem);
        --border-radius: 8px;
    }

    html {
        background: var(--background);
        color: var(--text);
        font-size: var(--font-size);
    }

    a {
        box-shadow: inset 0 0 0 0 var(--selected);
        padding: 8px;
        border-radius: var(--border-radius);
        text-decoration: none;
        font-family: var(--font), var(--nerd);
        color: var(--text);
        transition: color .3s ease-in-out, box-shadow .3s ease-in-out;
	width: 12vw;
    }

    a:hover {
        box-shadow: inset 25vw 0 0 0 var(--selected);
        background: var(--background);
    }

    @media (min-width: 100px) {
	main {
	    margin: 0 44vw;
	    text-align: center;
	}
	box {
	    width: 12vw;
	}
    }

    @media (min-width: 800px) {
	main {
	    margin: 35vh 26vw;
            display: flex;
	}
	box {
	    width: 12vw;
	}
    }
</style>
